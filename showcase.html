<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Dheera's Certificate</title>
  <style>
    :root { --bg: #FBF7EF; --ink: #5A4A2A; --gold: #E8B84B; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: radial-gradient(circle at 50% 28%, #FFF9EC, var(--bg));
      font-family: -apple-system, BlinkMacSystemFont, "Nunito", system-ui, sans-serif;
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
      background: #fff;
      border: 3px solid var(--gold);
      border-radius: 26px;
      padding: 44px 28px 34px;
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.12);
    }
    .trophy {
      font-size: 96px;
      line-height: 1;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.18));
      animation: pop 700ms cubic-bezier(0.2, 1.4, 0.4, 1);
    }
    h1 { font-size: 42px; font-weight: 900; margin: 14px 0 2px; letter-spacing: 0.5px; }
    .did { font-size: 18px; line-height: 1.4; opacity: 0.72; }
    .sets { display: flex; gap: 12px; justify-content: center; margin: 24px 0 20px; }
    .sets span {
      background: var(--gold);
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      padding: 8px 20px;
      border-radius: 999px;
    }
    .date { font-size: 15px; opacity: 0.6; margin-bottom: 26px; }
    .back { color: #B98A1A; font-weight: 700; text-decoration: none; font-size: 15px; }
    @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.12); } 100% { transform: scale(1); } }
  </style>
</head>
<body>
  <main class="card">
    <div class="trophy">🏆</div>
    <h1>Dheera</h1>
    <p class="did">completed the whole<br />alphabet and numbers</p>
    <div class="sets"><span>A–Z</span><span>1–10</span></div>
    <p class="date" id="date"></p>
    <a class="back" href="./index.html">Back to the game</a>
  </main>
  <script>
    (function () {
      var ts = 0;
      try { ts = parseInt(localStorage.getItem('shapes.completed_at') || '0', 10); } catch (e) {}
      var d = ts ? new Date(ts) : new Date();
      document.getElementById('date').textContent =
        d.toLocaleDateString(undefined, { day: 'numeric', month: 'long', year: 'numeric' });
    })();
  </script>
</body>
</html>
